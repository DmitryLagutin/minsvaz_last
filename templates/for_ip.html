{% extends "base.html" %}
{% block content %}
<div class="content">
    <div class="container">
        <p>Расчет входящего и исходящего трафика по ip - адресу</p>
        <h3>Введите данные для расчета</h3>
        <form action="" method="post">
            <div class="form-group">
                <label for="ip">IP - адрес (пример - 192.168.23.165)</label>
                <input type="text" class="form-control" id="ip" name=ip placeholder="IP - адрес">
            </div>
            <div class="form-group">
                <label for="first_date">Начальная дата</label>
                <input type="date" class="form-control" id="first_date" name=first_date placeholder="Дата">
            </div>
            <div class="form-group">
                <label for="last_date">Конечная дата</label>
                <input type="date" class="form-control" id="last_date" name=last_date placeholder="Дата">
            </div>
            <button type="submit" class="btn btn-default">Рассчитать</button>
        </form>
    </div>
</div>
{% endblock %}
