{% extends "base.html" %}

{% block content %}

<div class="content">
    <div class="container">
        <h2>Введите данные для расчета</h2>
        <form action="" method="post">
            <div class="form-group">
                <label for="first_date">Начальная дата (например: "2020-01-01 00:00:00")</label>
                <input type="datetime-local" class="form-control" id="first_date" name=first_date placeholder="Дата">
            </div>
            <div class="form-group">
                <label for="last_date">Конечная дата (например: "2020-12-01 00:00:00")</label>
                <input type="datetime-local" class="form-control" id="last_date" name=last_date placeholder="Дата">
            </div>
            <button type="submit" class="btn btn-default">Рассчитать</button>
        </form>

    </div>
</div>

{% endblock %}
